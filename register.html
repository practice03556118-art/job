
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | HireHub</title>

    <link rel="icon" href="/hire.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            flex-direction:column;
            background-image: url("/login.png");
            background-repeat: no-repeat;
            background-size: cover;
        }

        .main-content{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .form-box{
            background:#fff;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h2{
            color:#0d6efd;
            font-weight:bold;
            margin-bottom:10px;
        }

        .welcome-text{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }

        .form-label{
            font-weight:600;
            color:#333;
        }

        .form-control{
            height:50px;
            border-radius:12px;
            border:1px solid #dcdcdc;
        }

        .form-control:focus{
            border-color:#0d6efd;
            box-shadow:0 0 8px rgba(13,110,253,0.3);
        }

        .register-btn{
            background:linear-gradient(45deg,#0d6efd,#4facfe);
            border:none;
            color:white;
            padding:12px;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .register-btn:hover{
            transform:translateY(-3px);
            box-shadow:0 8px 20px rgba(13,110,253,0.4);
        }

        .register-btn:active{
            transform:scale(0.98);
        }

        .footer{
            text-align:center;
            color:white;
            padding:15px;
            font-size:14px;
            background:rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white">
        <div class="container">

            <a class="navbar-brand fw-bold text-primary" href="#">
                HireHub
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="companies.html">Companies</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="jobs.html">Jobs</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>

                    <li class="nav-item">
                        <a class="btn btn-primary ms-2" href="login.html">
                            Login
                        </a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>


    <div class="main-content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">

                    <div class="form-box">

                        <h2 class="text-center">Create Account</h2>

                        <p class="welcome-text">
                            Register to get started
                        </p>

                        <form>

                            <label for="fullname" class="form-label">
                                Full Name
                            </label>
                            <input
                                type="text"
                                id="fullname"
                                class="form-control mb-3"
                                placeholder="Enter your full name"
                                required>

                            <label for="email" class="form-label">
                                Email Address
                            </label>
                            <input
                                type="email"
                                id="email"
                                class="form-control mb-3"
                                placeholder="Enter your email"
                                required>

                            <label for="password" class="form-label">
                                Password
                            </label>
                            <input
                                type="password"
                                id="password"
                                class="form-control mb-4"
                                placeholder="Enter your password"
                                required>

                            <button
                                type="button"
                                id="registerBtn"
                                class="register-btn w-100">
                                Register
                            </button>

                        </form>

                    </div>

                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p class="mb-0">
            © 2026 HireHub. All Rights Reserved.
        </p>
    </footer>

    <script>
        document.getElementById("registerBtn").addEventListener("click", function () {
            alert("🎉 Registered Successfully!");
        });
    </script>

</body>
</html>
